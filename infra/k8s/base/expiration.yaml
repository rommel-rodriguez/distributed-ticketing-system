apiVersion: apps/v1
kind: Deployment
metadata:
  name: expiration
  labels:
    app: expiration
spec:
  replicas: 2
  selector:
    matchLabels:
      app: expiration
  template:
    metadata:
      labels:
        app: expiration
    spec:
      imagePullSecrets:
        - name: dockerhub-creds
      containers:
        - name: expiration
          image: docker.io/example/ticketing-expiration:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NATS_CLIENT_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NATS_URL
              value: nats://nats-jets-svc:4222
            - name: NATS_CLUSTER_ID
              value: ticketing
            - name: REDIS_HOST
              value: expiration-redis-svc
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: expiration-svc
  labels:
    app: expiration
spec:
  selector:
    app: expiration
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
