apiVersion: apps/v1 
kind: Deployment
metadata:
  name: payments-mongo
spec:
  selector:
    matchLabels:
      app: payments-mongo
  template:
    metadata:
      labels:
        app: payments-mongo
    spec:
      containers:
        - name: payments-mongo
          image: mongo:7.0.11-jammy

---

apiVersion: v1
kind: Service
metadata:
  name: payments-mongo-svc
spec:
  selector:
    app: payments-mongo
  ports:
    - port: 27017 
      targetPort: 27017
      protocol: TCP
      name: db