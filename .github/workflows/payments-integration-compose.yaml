name: "Payments microservice system tests"

on:
  pull_request:
    branches:
      - main
    paths:
      - "payments/**"
      - "common/**"
      - "docker-compose.integration.yml"
      - ".github/workflows/payments-integration-compose.yaml"
  workflow_dispatch:

jobs:
  payments-system:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: DEV
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Hub login (avoids pull-rate flakiness)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Start dependencies
        run: docker compose -f docker-compose.integration.yml up -d mongo nats stripe-mock

      - name: Run payments system tests
        run: docker compose -f docker-compose.integration.yml run --rm payments-tests

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.integration.yml down -v --remove-orphans
