name: Build and Push Container Images to Registry 
on:
  workflow_call: 
    secrets:
      REGISTRY_USER:
        # required: true
        description: "Username of the container registry"
      REGISTRY_TOKEN:
        # required: true
        description: "Registry access token for automated push to registry"
    inputs:
      service:
        required: true
        type: string
      context:
        required: true
        type: string
      platforms:
        required: false
        type: string
        default: linux/amd64

jobs:
  build-and-push:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write # Needed for GHCR
    steps:
      - name: Checkout
        uses: actions/checkout@v4 
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: login to registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          # username: ${{ secrets.REGISTRY_USER }}
          username: ${{ github.actor }}
          # password: ${{ secrets.REGISTRY_TOKEN }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push ${{ inputs.service }} using commit SHA as tag 
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context }} 
          push: true
          platforms: ${{ inputs.platforms }} 
          tags: |
            ghcr.io/${{ github.repository_owner }}/orders:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/orders:latest